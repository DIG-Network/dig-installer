# PR quality gates for dig-installer (Rust single-crate).
#
# Runs on every pull request to main (and on pushes to main so the default
# branch stays green). Enforces the professional gate set: formatting, lints
# (clippy -D warnings), and the test suite with line coverage gated at >=80%.
# These job names are the stable required-check contexts wired on the branch.
#
# Mirrors the gate commands already used by the release workflow's `check`
# job, but fires pre-merge on the PR rather than post-tag.
#
# The jobs above only ever touch the ROOT `dig-installer` crate. The Tauri GUI
# crate (`gui/app/src-tauri`, package `digstore-installer`) deliberately
# declares its own empty `[workspace]` table so building the CLI never drags
# in the Tauri dependency tree — but that isolation means no root-level
# `cargo` invocation above ever compiles/lints/tests it. Historically it was
# only ever built by `release.yml`'s `build-gui` job, which runs AFTER a
# version tag is already pushed, so a GUI-only compile/lint/test regression
# was caught post-release rather than pre-merge (task #238, dig_ecosystem
# issue). The `gui-*` jobs below close that gap by scoping the same gate set
# at `gui/app/src-tauri` via `--manifest-path`.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust (stable + rustfmt)
        run: |
          rustup toolchain install stable --component rustfmt
          rustup default stable
          rustc --version
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust (stable + clippy)
        run: |
          rustup toolchain install stable --component clippy
          rustup default stable
          rustc --version
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-installer-ci-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-installer-ci-clippy-
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    name: test + coverage (>=80% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust (stable + llvm-tools)
        run: |
          rustup toolchain install stable --component llvm-tools-preview
          rustup default stable
          rustc --version
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-installer-ci-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-installer-ci-test-
      # Unit + integration tests with line coverage, gated at >=80%, run under
      # nextest with retries so a genuinely flaky test (fails then passes on
      # rerun) is retried + surfaced as FLAKY in the run output rather than
      # failing the whole CI job outright (#489). main.rs is excluded: it is
      # thin binary glue (arg-parse -> run_report -> stdout/exit) whose only
      # paths require the network; all agent-facing logic lives in the library
      # and is unit-tested there. Repo currently measures ~87% lines.
      - name: Test with coverage (gate >=80% lines, nextest retries flaky failures)
        run: cargo llvm-cov nextest --workspace --all-features --locked --fail-under-lines 80 --ignore-filename-regex 'main\.rs$' -- --retries 2

  # Per-OS compile verification (task #177). fmt/clippy/test above run ONLY on
  # ubuntu-latest, so `#[cfg(windows)]`/`#[cfg(target_os = "macos")]` modules
  # (the dig-dns Windows-service host + macOS LaunchDaemon wiring, `src/dns/`)
  # are cfg'd OUT of every job above and never actually compiled pre-merge —
  # the per-OS release binaries in `release.yml` only build AFTER a merge to
  # main, which is too late to gate a PR. This job closes that gap: a plain
  # `cargo build --all-targets` on the two OSes ubuntu-latest cannot compile,
  # catching a platform-specific compile error before merge instead of after
  # (this task's own review found — and fixed — two such bugs: a struct
  # literal missing a field, present ONLY in code this job now exercises).
  build-os-matrix:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust (stable)
        shell: bash
        run: |
          rustup toolchain install stable
          rustup default stable
          rustc --version
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-installer-ci-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-installer-ci-build-
      - run: cargo build --all-targets --locked

  # ---------------------------------------------------------------------------
  # GUI crate (`gui/app/src-tauri`, package `digstore-installer`) gates.
  # See the header comment: this crate is its own workspace root and was
  # previously compiled/linted/tested nowhere pre-merge. Scoped via
  # --manifest-path so the root-crate jobs above stay untouched.
  # ---------------------------------------------------------------------------
  gui-fmt:
    name: gui rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust (stable + rustfmt)
        run: |
          rustup toolchain install stable --component rustfmt
          rustup default stable
          rustc --version
      # No Tauri system deps needed: fmt only parses source, never compiles.
      - run: cargo fmt --manifest-path gui/app/src-tauri/Cargo.toml --all -- --check

  gui-clippy:
    name: gui clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust (stable + clippy)
        run: |
          rustup toolchain install stable --component clippy
          rustup default stable
          rustc --version
      # Tauri/wry on Linux links against webkit2gtk/appindicator/rsvg; without
      # these the crate fails to even compile, not just to bundle. Mirrors
      # release.yml's build-gui Linux step.
      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            gui/app/src-tauri/target
          key: ${{ runner.os }}-installer-ci-gui-clippy-${{ hashFiles('gui/app/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-installer-ci-gui-clippy-
      - run: cargo clippy --manifest-path gui/app/src-tauri/Cargo.toml --all-targets --locked -- -D warnings

  gui-test:
    name: gui test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable
          rustup default stable
          rustc --version
      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            gui/app/src-tauri/target
          key: ${{ runner.os }}-installer-ci-gui-test-${{ hashFiles('gui/app/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-installer-ci-gui-test-
      # No coverage gate here (unlike the root crate's `test` job): this crate
      # is a Tauri desktop app whose bulk is UI/command wiring, not the kind
      # of pure logic the root crate's >=80% line gate targets. The one real
      # test module (`plan_from_selection_tests` in src/install.rs) is
      # OS-agnostic pure logic and runs on both matrix OSes; the separate
      # `#[cfg(all(test, windows))]` module in the same file structurally
      # cannot compile on ubuntu/macos, so it's naturally skipped here with no
      # coverage loss (see the windows-only gui-test-windows job below). Run
      # under nextest with retries so a flaky test is retried + reported
      # rather than failing the job outright (#489).
      - run: cargo nextest run --manifest-path gui/app/src-tauri/Cargo.toml --locked --retries 2

  # Experimental, NON-blocking: observes whether `cargo test` on this crate
  # reproduces the "requires elevation" (Windows os error 740) quirk seen
  # running the compiled test-harness binary on a non-elevated local Windows
  # console (task #238 dig_ecosystem issue) on GitHub's hosted windows-latest
  # runner, which runs in a different privilege context. Not required: a
  # flaky required check is worse than the narrower gui-test job above, which
  # already covers this crate's only OS-agnostic test content on ubuntu/macos.
  gui-test-windows:
    name: gui test (windows-latest, experimental)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable
          rustup default stable
          rustc --version
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            gui/app/src-tauri/target
          key: ${{ runner.os }}-installer-ci-gui-test-${{ hashFiles('gui/app/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-installer-ci-gui-test-
      - run: cargo nextest run --manifest-path gui/app/src-tauri/Cargo.toml --locked --retries 2

  gui-build-os-matrix:
    name: gui build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust (stable)
        shell: bash
        run: |
          rustup toolchain install stable
          rustup default stable
          rustc --version
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            gui/app/src-tauri/target
          key: ${{ runner.os }}-installer-ci-gui-build-${{ hashFiles('gui/app/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-installer-ci-gui-build-
      - run: cargo build --manifest-path gui/app/src-tauri/Cargo.toml --all-targets --locked

  gui-frontend:
    name: gui frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No lint/test suite exists yet for gui/app (runbooks/local-running.md
      # notes this explicitly) — standing up one is out of scope here; a
      # green install + production build is the correctly-sized JS gate for
      # this task (task #238 dig_ecosystem issue).
      - name: Install frontend deps
        working-directory: gui/app
        run: npm ci || npm install
      - name: Build frontend
        working-directory: gui/app
        run: npm run build
